<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO list</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark hip-hop theme */
            --primary: #ff003c;
            --primary-dark: #cc0030;
            --accent: #ff003c;
            --bg: #0a0a0a;
            --surface: #151515;
            --surface-muted: #1c1c1c;
            --border: #2a2a2a;
            --text: #ededed;
            --text-muted: #7a7a7a;
            --high: #ff003c;
            --medium: #f59e0b;
            --low: #10b981;
            --radius: 8px;
            --shadow: 0 1px 2px rgba(0,0,0,0.5);
            --shadow-lg: 0 8px 24px rgba(255,0,60,0.12);
        }

        body.dark {
            --bg: #050505;
            --surface: #111111;
            --surface-muted: #181818;
            --border: #2a2a2a;
            --text: #f5f5f5;
            --text-muted: #6b6b6b;
        }
        body.dark .todo-card.overdue { background: #1f0a12; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }
        /* 오로라 글로우 (배경) */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(ellipse 80% 50% at 20% 0%, rgba(255,0,60,0.18), transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 10%, rgba(120,0,200,0.18), transparent 60%),
                radial-gradient(ellipse 70% 60% at 50% 100%, rgba(0,120,255,0.12), transparent 60%);
            animation: aurora 18s ease-in-out infinite alternate;
        }
        /* 미세한 그리드 패턴 (배경) */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
            pointer-events: none;
        }
        @keyframes aurora {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(-3%, 2%) scale(1.05); }
            100% { transform: translate(2%, -2%) scale(1.02); }
        }

        /* ── Header ── */
        .header {
            background: rgba(15, 15, 15, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: var(--text);
            padding: 48px 0 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background-image:
                radial-gradient(ellipse at top, rgba(255,0,60,0.18), transparent 70%),
                radial-gradient(circle at 1px 1px, rgba(255,255,255,0.035) 1px, transparent 0);
            background-size: auto, 14px 14px;
        }
        /* 회전하는 LP 레코드 (헤더 좌측) */
        .vinyl-deco {
            position: absolute;
            width: 300px;
            height: 300px;
            left: -80px;
            top: -70px;
            opacity: 0.85;
            animation: spin 22s linear infinite;
            pointer-events: none;
            z-index: 0;
            filter: drop-shadow(0 0 18px rgba(255,0,60,0.45)) drop-shadow(0 0 4px rgba(0,0,0,0.8));
        }
        /* 카세트 테이프 라인 (헤더 우측) */
        .tape-deco {
            position: absolute;
            width: 260px;
            height: 150px;
            right: -40px;
            bottom: -20px;
            opacity: 0.9;
            transform: rotate(-8deg);
            pointer-events: none;
            z-index: 0;
            filter: drop-shadow(0 0 12px rgba(255,0,60,0.5));
        }
        .header > *:not(.vinyl-deco):not(.tape-deco):not(.dark-toggle) { position: relative; z-index: 1; }
        .header > .dark-toggle { z-index: 2; }

        /* ── 추가 데코: 네온 마이크 / 이퀄라이저 / 다이아 체인 ── */
        .mic-deco {
            position: fixed;
            left: 22px;
            top: 50%;
            transform: translateY(-50%) rotate(-12deg);
            width: 130px;
            height: 280px;
            opacity: 0.55;
            pointer-events: none;
            z-index: -1;
            filter: drop-shadow(0 0 16px rgba(255,0,60,0.55));
            animation: mic-float 6s ease-in-out infinite;
        }
        @keyframes mic-float {
            0%, 100% { transform: translateY(-50%) rotate(-12deg); }
            50%      { transform: translateY(-54%) rotate(-9deg); }
        }
        .eq-deco {
            position: fixed;
            right: 26px;
            top: 50%;
            transform: translateY(-50%);
            width: 110px;
            height: 180px;
            opacity: 0.6;
            pointer-events: none;
            z-index: -1;
            filter: drop-shadow(0 0 12px rgba(120,0,255,0.5));
        }
        .eq-deco rect { transform-origin: center bottom; animation: eq-bounce 1.1s ease-in-out infinite; }
        .eq-deco rect:nth-child(1) { animation-delay: 0.0s; }
        .eq-deco rect:nth-child(2) { animation-delay: 0.15s; }
        .eq-deco rect:nth-child(3) { animation-delay: 0.3s; }
        .eq-deco rect:nth-child(4) { animation-delay: 0.45s; }
        .eq-deco rect:nth-child(5) { animation-delay: 0.6s; }
        @keyframes eq-bounce {
            0%, 100% { transform: scaleY(0.3); }
            50%      { transform: scaleY(1); }
        }
        .chain-deco {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            width: 160px;
            height: 130px;
            opacity: 0.7;
            pointer-events: none;
            z-index: -1;
            filter: drop-shadow(0 0 18px rgba(0,200,255,0.55)) drop-shadow(0 0 6px rgba(255,255,255,0.3));
            animation: chain-sway 4s ease-in-out infinite;
        }
        @keyframes chain-sway {
            0%, 100% { transform: translateX(-50%) rotate(-3deg); }
            50%      { transform: translateX(-50%) rotate(3deg); }
        }
        /* 작은 화면에서는 사이드 데코 숨김 (가독성 보호) */
        @media (max-width: 1100px) {
            .mic-deco, .eq-deco { display: none; }
        }
        @media (max-width: 580px) {
            .chain-deco { width: 110px; height: 90px; bottom: 8px; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .header-tagline {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 0 18px rgba(255,255,255,0.35), 0 0 30px rgba(255,0,60,0.3);
        }
        .header-tagline .heart {
            color: #ff003c;
            display: inline-block;
            margin: 0 8px;
            animation: heartbeat 1.4s ease-in-out infinite;
            text-shadow: 0 0 12px rgba(255,0,60,0.8);
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25%      { transform: scale(1.18); }
            50%      { transform: scale(1); }
            75%      { transform: scale(1.12); }
        }
        .header h1 {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -2px;
            color: var(--text);
            text-shadow: 0 0 28px rgba(255,0,60,0.45);
        }
        .header .stats {
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .progress-wrap {
            margin: 16px auto 0;
            max-width: 340px;
            background: #1f1f1f;
            border-radius: 999px;
            height: 3px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff003c, #ff4d6d);
            border-radius: 999px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px rgba(255,0,60,0.6);
        }
        .progress-label {
            margin-top: 8px;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* ── Dark Mode Toggle ── */
        .dark-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 14px;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.5px;
        }
        .dark-toggle:hover {
            background: var(--surface-muted);
            color: var(--text);
            border-color: var(--primary);
        }

        .container { max-width: 760px; margin: 0 auto; padding: 28px 16px 48px; }

        /* ── Add Form ── */
        .add-form {
            background: rgba(21, 21, 21, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 22px 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .add-form h2 {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-row { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 130px; }
        .form-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input[type="text"], input[type="date"], textarea, select {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.88rem;
            font-family: inherit;
            color: var(--text);
            background: var(--surface-muted);
            transition: border-color 0.15s, box-shadow 0.15s;
            width: 100%;
        }
        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,0,60,0.18);
        }
        textarea { resize: vertical; min-height: 68px; }

        /* ── Buttons ── */
        .btn {
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .btn-primary {
            background: var(--primary);
            color: #ffffff;
            padding: 10px 22px;
            box-shadow: 0 4px 16px rgba(255,0,60,0.25);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 6px 20px rgba(255,0,60,0.4);
        }
        .btn-secondary {
            background: var(--surface-muted);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: #262626; border-color: #3a3a3a; }
        .btn-danger {
            background: transparent;
            color: var(--high);
            border: 1px solid var(--border);
        }
        .btn-danger:hover { background: var(--high); color: white; border-color: var(--high); }
        .btn-sm { padding: 5px 10px; font-size: 0.7rem; border-radius: 5px; }

        /* ── Controls ── */
        .controls {
            background: rgba(21, 21, 21, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 12px 14px;
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .search-box { flex: 1; min-width: 180px; }
        .search-box input { width: 100%; }

        .filter-tabs { display: flex; gap: 2px; }
        .filter-btn {
            border: none;
            border-radius: 5px;
            padding: 6px 12px;
            font-size: 0.72rem;
            cursor: pointer;
            font-family: inherit;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            transition: all 0.15s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .filter-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(255,0,60,0.3);
        }
        .filter-btn:hover:not(.active) { background: var(--surface-muted); color: var(--text); }

        .sort-select select { padding: 6px 10px; font-size: 0.78rem; min-width: 110px; }

        /* ── Todo Cards ── */
        .todo-list { display: flex; flex-direction: column; gap: 8px; }

        .todo-card {
            background: rgba(21, 21, 21, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 14px 16px;
            border-left: 3px solid var(--border);
            transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .todo-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-1px);
        }
        .todo-card.completed { opacity: 0.4; border-left-color: var(--border); }
        .todo-card.priority-high { border-left-color: var(--high); box-shadow: -3px 0 12px rgba(255,0,60,0.15); }
        .todo-card.priority-medium { border-left-color: var(--medium); }
        .todo-card.priority-low { border-left-color: var(--low); }
        .todo-card.overdue { background: #1a0a10; }

        .todo-header { display: flex; align-items: flex-start; gap: 12px; }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1.5px solid #3a3a3a;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
            appearance: none;
            -webkit-appearance: none;
            background: var(--surface-muted);
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .todo-checkbox:hover { border-color: var(--primary); }
        .todo-checkbox:checked {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(255,0,60,0.5);
        }
        .todo-checkbox:checked::after {
            content: '✓';
            color: white;
            font-size: 11px;
            font-weight: 700;
        }

        .todo-content { flex: 1; min-width: 0; }
        .todo-title { font-size: 0.98rem; font-weight: 700; line-height: 1.4; letter-spacing: -0.2px; }
        .completed .todo-title { text-decoration: line-through; color: var(--text-muted); }
        .todo-desc { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }

        .todo-meta { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; align-items: center; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            border-radius: 4px;
            padding: 3px 8px;
            font-size: 0.68rem;
            font-weight: 600;
            border: 1px solid transparent;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .badge-priority-high { background: rgba(255,0,60,0.15); color: #ff5577; border-color: rgba(255,0,60,0.4); }
        .badge-priority-medium { background: rgba(245,158,11,0.15); color: #fbbf24; border-color: rgba(245,158,11,0.4); }
        .badge-priority-low { background: rgba(16,185,129,0.15); color: #34d399; border-color: rgba(16,185,129,0.4); }
        .badge-category { background: var(--surface-muted); color: var(--text); border-color: var(--border); }
        .badge-due { background: var(--surface-muted); color: var(--text-muted); border-color: var(--border); }
        .badge-overdue { background: rgba(255,0,60,0.2); color: #ff5577; border-color: rgba(255,0,60,0.5); font-weight: 700; }
        .badge-done { background: rgba(16,185,129,0.15); color: #34d399; border-color: rgba(16,185,129,0.4); }

        .todo-actions { display: flex; gap: 5px; flex-shrink: 0; }

        /* ── Inline Edit Form ── */
        .edit-form {
            display: none;
            margin-top: 12px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }
        .edit-form.open { display: block; }
        .edit-form .form-row { margin-bottom: 8px; }
        .edit-actions { display: flex; gap: 8px; justify-content: flex-end; }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 56px 24px;
            color: var(--text-muted);
            background: rgba(21, 21, 21, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .empty-state .icon { font-size: 2.25rem; margin-bottom: 10px; opacity: 0.4; }
        .empty-state p { font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; }

        /* 스크롤바 다크 톤 */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        ::selection { background: var(--primary); color: white; }

        @media (max-width: 580px) {
            .header h1 { font-size: 2.2rem; }
            .form-row { flex-direction: column; }
            .controls { flex-direction: column; align-items: stretch; }
            .filter-tabs { flex-wrap: wrap; }
            .todo-actions { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- ── 사이드 데코: 네온 마이크 (좌측 고정) ── -->
<svg class="mic-deco" viewBox="0 0 130 280" aria-hidden="true">
    <defs>
        <linearGradient id="micHead" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#ff4d6d"/>
            <stop offset="100%" stop-color="#cc0030"/>
        </linearGradient>
        <linearGradient id="micBody" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#3a3a3a"/>
            <stop offset="100%" stop-color="#0a0a0a"/>
        </linearGradient>
    </defs>
    <!-- 마이크 헤드 (그릴) -->
    <ellipse cx="65" cy="55" rx="40" ry="48" fill="url(#micHead)" stroke="#fff" stroke-width="1.5"/>
    <g stroke="#1a0008" stroke-width="0.7" opacity="0.6" fill="none">
        <line x1="30" y1="40" x2="100" y2="40"/>
        <line x1="28" y1="55" x2="102" y2="55"/>
        <line x1="30" y1="70" x2="100" y2="70"/>
        <line x1="65" y1="10" x2="65" y2="100"/>
        <line x1="50" y1="12" x2="50" y2="98"/>
        <line x1="80" y1="12" x2="80" y2="98"/>
    </g>
    <ellipse cx="65" cy="55" rx="40" ry="48" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
    <!-- 마이크 넥 -->
    <rect x="55" y="100" width="20" height="18" fill="#2a2a2a" stroke="#ff003c" stroke-width="1"/>
    <rect x="58" y="118" width="14" height="10" fill="#1a1a1a"/>
    <!-- 마이크 본체 -->
    <rect x="50" y="128" width="30" height="90" rx="4" fill="url(#micBody)" stroke="#ff003c" stroke-width="1.2"/>
    <!-- 스위치/링 디테일 -->
    <rect x="50" y="148" width="30" height="3" fill="#ff003c"/>
    <rect x="50" y="175" width="30" height="2" fill="#5a5a5a"/>
    <circle cx="65" cy="195" r="3" fill="#ff003c"/>
    <!-- 케이블 -->
    <path d="M 65 218 Q 50 240 70 255 Q 90 268 60 280" stroke="#ff003c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- ON AIR 글로우 점 -->
    <circle cx="65" cy="55" r="3" fill="#fff"/>
</svg>

<!-- ── 사이드 데코: 이퀄라이저 (우측 고정, 애니메이션) ── -->
<svg class="eq-deco" viewBox="0 0 110 180" aria-hidden="true">
    <defs>
        <linearGradient id="eqGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#ff003c"/>
            <stop offset="50%"  stop-color="#a020ff"/>
            <stop offset="100%" stop-color="#00c8ff"/>
        </linearGradient>
    </defs>
    <rect x="5"   y="20" width="14" height="150" rx="3" fill="url(#eqGrad)"/>
    <rect x="25"  y="20" width="14" height="150" rx="3" fill="url(#eqGrad)"/>

<div class="container">

    <!-- 추가 폼 -->
    <div class="add-form">
        <h2>+ 새 할 일 추가</h2>
        <form id="todo-form">
            <div class="form-row">
                <div class="form-group" style="flex:3">
                    <label>제목 *</label>
                    <input type="text" id="title" placeholder="할 일 제목을 입력하세요" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>설명 (선택)</label>
                    <textarea id="description" placeholder="상세 설명..."></textarea>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>우선순위</label>
                    <select id="priority">
                        <option value="high">🔴 높음</option>
                        <option value="medium" selected>🟡 보통</option>
                        <option value="low">🟢 낮음</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>마감일</label>
                    <input type="date" id="due_date">
                </div>
                <div class="form-group">
                    <label>카테고리</label>
                    <input type="text" id="category" placeholder="예: 업무, 개인...">
                </div>
            </div>
            <div style="display:flex; justify-content:flex-end; margin-top:4px;">
                <button type="submit" class="btn btn-primary">추가하기</button>
            </div>
        </form>
    </div>

    <!-- 검색 / 필터 / 정렬 -->
    <div class="controls">
        <div class="search-box">
            <input type="text" id="search" placeholder="🔍  제목, 설명, 카테고리 검색..." oninput="renderTodos()">
        </div>
        <div class="filter-tabs">
            <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
            <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
            <button class="filter-btn" onclick="setFilter('completed', this)">완료</button>
            <button class="filter-btn" onclick="setFilter('overdue', this)">기한초과</button>
        </div>
        <div class="sort-select">
            <select id="sort" onchange="renderTodos()">
                <option value="created_desc">최신순</option>
                <option value="created_asc">오래된순</option>
                <option value="due_asc">마감일순</option>
                <option value="priority_desc">우선순위순</option>
            </select>
        </div>
        <button class="btn btn-danger btn-sm" id="clear-completed-btn" onclick="deleteCompleted()" style="display:none">🗑 완료 항목 삭제</button>
    </div>

    <!-- 할 일 목록 -->
    <div class="todo-list" id="todo-list"></div>
</div>

<script>
let todos = [];
let currentFilter = 'all';
const priorityOrder = { high: 0, medium: 1, low: 2 };

// ── 데이터 로드 ──────────────────────────────────────────
async function fetchTodos() {
    const res = await fetch('/todos');
    todos = await res.json();
    renderTodos();
}

// ── 렌더링 ───────────────────────────────────────────────
function renderTodos() {
    const search = document.getElementById('search').value.toLowerCase();
    const sort = document.getElementById('sort').value;
    const today = new Date().toISOString().split('T')[0];

    let filtered = todos.filter(t => {
        const matchSearch = t.title.toLowerCase().includes(search) ||
            (t.description || '').toLowerCase().includes(search) ||
            (t.category || '').toLowerCase().includes(search);
        if (!matchSearch) return false;
        const isOverdue = t.due_date && t.due_date < today && !t.completed;
        if (currentFilter === 'active')    return !t.completed;
        if (currentFilter === 'completed') return t.completed;
        if (currentFilter === 'overdue')   return isOverdue;
        return true;
    });

    filtered.sort((a, b) => {
        if (sort === 'created_asc')   return a.id - b.id;
        if (sort === 'created_desc')  return b.id - a.id;
        if (sort === 'due_asc') {
            if (!a.due_date) return 1;
            if (!b.due_date) return -1;
            return a.due_date.localeCompare(b.due_date);
        }
        if (sort === 'priority_desc') {
            return (priorityOrder[a.priority] ?? 1) - (priorityOrder[b.priority] ?? 1);
        }
        return 0;
    });

    const list = document.getElementById('todo-list');
    if (filtered.length === 0) {
        const msg = search ? '검색 결과가 없습니다.'
            : currentFilter === 'overdue'   ? '기한이 초과된 할 일이 없습니다.'
            : currentFilter === 'completed' ? '완료된 할 일이 없습니다.'
            : currentFilter === 'active'    ? '미완료 할 일이 없습니다.'
            : '할 일을 추가해보세요!';
        list.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>${msg}</p></div>`;
    } else {
        list.innerHTML = filtered.map(t => renderCard(t)).join('');
    }

    // 통계 업데이트
    const total  = todos.length;
    const done   = todos.filter(t => t.completed).length;
    const overdue = todos.filter(t => t.due_date && t.due_date < today && !t.completed).length;
    document.getElementById('stats').textContent =
        `전체 ${total}개 · 완료 ${done}개 · 미완료 ${total - done}개` +
        (overdue ? ` · ⚠️ 기한초과 ${overdue}개` : '');

    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-label').textContent = total > 0 ? `완료율 ${pct}%` : '';

    // 완료 항목이 있을 때만 일괄삭제 버튼 표시
    document.getElementById('clear-completed-btn').style.display = done > 0 ? '' : 'none';
}

function renderCard(todo) {
    const today = new Date().toISOString().split('T')[0];
    const isOverdue = todo.due_date && todo.due_date < today && !todo.completed;

    const priorityLabel = { high: '🔴 높음', medium: '🟡 보통', low: '🟢 낮음' };
    const pBadge  = todo.priority
        ? `<span class="badge badge-priority-${todo.priority}">${priorityLabel[todo.priority] || todo.priority}</span>` : '';
    const cBadge  = todo.category
        ? `<span class="badge badge-category">🏷 ${esc(todo.category)}</span>` : '';
    const dBadge  = todo.due_date
        ? `<span class="badge ${isOverdue ? 'badge-overdue' : 'badge-due'}">${isOverdue ? '⚠️ 기한초과' : '📅'} ${todo.due_date}</span>` : '';
    const okBadge = todo.completed
        ? `<span class="badge badge-done">✅ 완료</span>` : '';

    const cls = ['todo-card',
        todo.completed ? 'completed' : '',
        todo.priority  ? `priority-${todo.priority}` : '',
        isOverdue      ? 'overdue' : '',
    ].filter(Boolean).join(' ');

    return `
<div class="${cls}" id="card-${todo.id}">
  <div class="todo-header">
    <input type="checkbox" class="todo-checkbox"
      ${todo.completed ? 'checked' : ''}
      onchange="toggleComplete(${todo.id}, this.checked)">
    <div class="todo-content">
      <div class="todo-title">${esc(todo.title)}</div>
      ${todo.description ? `<div class="todo-desc">${esc(todo.description)}</div>` : ''}
      <div class="todo-meta">${pBadge}${cBadge}${dBadge}${okBadge}</div>
    </div>
    <div class="todo-actions">
      <button class="btn btn-secondary btn-sm" onclick="toggleEditForm(${todo.id})">✏️ 수정</button>
      <button class="btn btn-danger btn-sm" onclick="deleteTodo(${todo.id})">🗑 삭제</button>
    </div>
  </div>

  <!-- 인라인 수정 폼 -->
  <div class="edit-form" id="edit-${todo.id}">
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>제목</label>
        <input type="text" id="et-${todo.id}" value="${escAttr(todo.title)}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>설명</label>
        <textarea id="ed-${todo.id}">${esc(todo.description || '')}</textarea>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>우선순위</label>
        <select id="ep-${todo.id}">
          <option value="high"   ${todo.priority === 'high'   ? 'selected' : ''}>🔴 높음</option>
          <option value="medium" ${todo.priority === 'medium' ? 'selected' : ''}>🟡 보통</option>
          <option value="low"    ${todo.priority === 'low'    ? 'selected' : ''}>🟢 낮음</option>
        </select>
      </div>
      <div class="form-group">
        <label>마감일</label>
        <input type="date" id="edu-${todo.id}" value="${todo.due_date || ''}">
      </div>
      <div class="form-group">
        <label>카테고리</label>
        <input type="text" id="ec-${todo.id}" value="${escAttr(todo.category || '')}">
      </div>
    </div>
    <div class="edit-actions">
      <button class="btn btn-secondary btn-sm" onclick="toggleEditForm(${todo.id})">취소</button>
      <button class="btn btn-primary btn-sm" onclick="saveEdit(${todo.id})">저장</button>
    </div>
  </div>
</div>`;
}

// ── 액션 ─────────────────────────────────────────────────
function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTodos();
}

function toggleEditForm(id) {
    document.getElementById(`edit-${id}`).classList.toggle('open');
}

async function toggleComplete(id, completed) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    const res = await fetch(`/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...todo, completed })
    });
    if (res.ok) { todo.completed = completed; renderTodos(); }
}

async function saveEdit(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    const updated = {
        ...todo,
        title:       document.getElementById(`et-${id}`).value,
        description: document.getElementById(`ed-${id}`).value,
        priority:    document.getElementById(`ep-${id}`).value,
        due_date:    document.getElementById(`edu-${id}`).value || null,
        category:    document.getElementById(`ec-${id}`).value || null,
    };
    const res = await fetch(`/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updated)
    });
    if (res.ok) { Object.assign(todo, updated); renderTodos(); }
}

async function deleteTodo(id) {
    if (!confirm('이 항목을 삭제할까요?')) return;
    const res = await fetch(`/todos/${id}`, { method: 'DELETE' });
    if (res.ok) { todos = todos.filter(t => t.id !== id); renderTodos(); }
}

async function deleteCompleted() {
    const count = todos.filter(t => t.completed).length;
    if (!confirm(`완료된 항목 ${count}개를 모두 삭제할까요?`)) return;
    const res = await fetch('/todos/completed', { method: 'DELETE' });
    if (res.ok) { todos = todos.filter(t => !t.completed); renderTodos(); }
}

document.getElementById('todo-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const todo = {
        id:          Date.now(),
        title:       document.getElementById('title').value,
        description: document.getElementById('description').value,
        completed:   false,
        priority:    document.getElementById('priority').value,
        due_date:    document.getElementById('due_date').value || null,
        category:    document.getElementById('category').value || null,
        created_at:  new Date().toISOString(),
    };
    const res = await fetch('/todos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(todo)
    });
    if (res.ok) {
        todos.push(todo);
        renderTodos();
        e.target.reset();
        document.getElementById('priority').value = 'medium';
    }
});

// ── 다크 모드 ─────────────────────────────────────────────
function toggleDark() {
    const isDark = document.body.classList.toggle('dark');
    localStorage.setItem('darkMode', isDark ? '1' : '0');
    document.getElementById('dark-toggle').textContent = isDark ? '☀️ 라이트모드' : '🌙 다크모드';
}

// 페이지 로드 시 저장된 다크모드 설정 복원
if (localStorage.getItem('darkMode') === '1') {
    document.body.classList.add('dark');
    document.getElementById('dark-toggle').textContent = '☀️ 라이트모드';
}

// ── 유틸리티 ─────────────────────────────────────────────
function esc(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
    return String(str).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

fetchTodos();
</script>
